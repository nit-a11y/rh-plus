
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Colaboradores | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { red: '#D32F2F', black: '#121212', grey: '#F4F7F9' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/colaboradores.css">
</head>
<body class="bg-nordeste-grey h-screen flex overflow-hidden">

    <!-- SIDEBAR INDEPENDENTE -->
    <aside class="w-20 lg:w-72 bg-nordeste-black text-white flex flex-col flex-shrink-0 z-50">
        <div class="p-8 border-b border-white/5 flex items-center gap-4">
            <div class="w-10 h-10 bg-nordeste-red rounded-xl flex items-center justify-center font-black italic shadow-lg shadow-red-900/40">C</div>
            <div class="hidden lg:block">
                <h1 class="text-sm font-black uppercase italic leading-none">Gestão <span class="text-nordeste-red">Direta</span></h1>
                <p class="text-[8px] text-gray-500 font-bold uppercase mt-1 tracking-widest">Portal Colaboradores</p>
            </div>
        </div>

        <nav class="flex-1 p-6 space-y-2 mt-4 overflow-y-auto custom-scroll">
            <div class="nav-item-standalone active"><span>🏠</span> <span class="hidden lg:inline">Visão Consolidada</span></div>
            <div class="nav-item-standalone"><span>📅</span> <span class="hidden lg:inline">Agenda de Admissões</span></div>
            <div class="nav-item-standalone"><span>📉</span> <span class="hidden lg:inline">Taxa de Turnover</span></div>
            <div class="nav-item-standalone"><span>📑</span> <span class="hidden lg:inline">Documentos Pendentes</span></div>
        </nav>

        <div class="p-6 border-t border-white/5">
            <a href="employees-pro.html" class="flex items-center justify-center lg:justify-start gap-4 p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-all border border-white/10 group">
                <svg class="w-5 h-5 text-nordeste-red group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z"/></svg>
                <span class="hidden lg:inline text-[10px] font-black uppercase tracking-widest">Voltar ao Mestre</span>
            </a>
        </div>
    </aside>

    <!-- ÁREA DE CONTEÚDO -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <!-- HEADER DO PORTAL -->
        <header class="bg-white border-b border-gray-200 px-10 py-6 flex justify-between items-center shadow-sm z-40">
            <div class="flex-1 max-w-2xl relative">
                <input type="text" id="portal-search" oninput="window.liveSearch()" placeholder="Pesquisar colaborador por nome, CPF ou matrícula..." class="w-full pl-12 pr-4 py-3 bg-gray-100 border-none rounded-2xl text-sm font-bold shadow-inner focus:ring-2 focus:ring-nordeste-red transition-all">
                <svg class="w-5 h-5 text-gray-300 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <div class="flex items-center gap-6 ml-10">
                <div class="text-right hidden md:block">
                    <p id="portal-time" class="text-xs font-black text-gray-800 tabular-nums">00:00:00</p>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Tempo Real</p>
                </div>
                <div class="w-12 h-12 rounded-2xl bg-nordeste-red flex items-center justify-center font-black text-white shadow-xl rotate-3">RH</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 space-y-10 custom-scroll">
            
            <!-- WIDGETS DE MONITORAMENTO -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="portal-stat-card border-l-4 border-blue-500">
                    <p class="stat-label">Total Cadastrados</p>
                    <h3 id="stat-total" class="stat-value">0</h3>
                </div>
                <div class="portal-stat-card border-l-4 border-green-500">
                    <p class="stat-label">Ativos Agora</p>
                    <h3 id="stat-active" class="stat-value">0</h3>
                </div>
                <div class="portal-stat-card border-l-4 border-red-500">
                    <p class="stat-label">Desligamentos Mês</p>
                    <h3 id="stat-turnover" class="stat-value">0</h3>
                </div>
                <div class="portal-stat-card border-l-4 border-amber-500">
                    <p class="stat-label">Admissões em Fila</p>
                    <h3 id="stat-pending" class="stat-value">0</h3>
                </div>
            </div>

            <!-- GRID PRINCIPAL DE COLABORADORES -->
            <div class="space-y-6">
                <div class="flex justify-between items-end border-b border-gray-200 pb-4">
                    <h2 class="text-2xl font-black text-gray-800 uppercase italic">Base Operacional Nordeste</h2>
                    <div class="flex gap-2">
                         <button class="filter-chip active">Todos</button>
                         <button class="filter-chip">Administrativo</button>
                         <button class="filter-chip">Operacional</button>
                    </div>
                </div>
                <div id="portal-grid" class="portal-grid">
                    <!-- Cards injetados via JS -->
                </div>
            </div>

        </div>
    </main>

    <!-- DRAWER LATERAL DE DETALHES (INDEPENDENTE) -->
    <div id="portal-drawer-overlay" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm transition-opacity" onclick="window.closePortalDrawer()"></div>
    <aside id="portal-drawer" class="fixed top-0 right-[-100%] w-full max-w-lg h-full bg-white shadow-2xl z-[101] transition-all duration-500 ease-in-out flex flex-col">
        <header class="p-8 bg-nordeste-black text-white flex justify-between items-start">
            <div class="flex gap-4 items-center">
                <img id="drw-photo" src="" class="w-16 h-16 rounded-2xl object-cover border-4 border-white/20 shadow-xl">
                <div>
                    <h3 id="drw-name" class="text-xl font-black uppercase italic leading-tight truncate w-64">...</h3>
                    <p id="drw-reg" class="text-[10px] text-nordeste-red font-black uppercase mt-1 tracking-widest">#0000</p>
                </div>
            </div>
            <button onclick="window.closePortalDrawer()" class="text-white/30 hover:text-white transition-all text-2xl">✕</button>
        </header>
        <div id="drw-content" class="flex-1 overflow-y-auto p-10 space-y-8 custom-scroll bg-gray-50">
            <!-- Conteúdo dinâmico do prontuário rápido -->
        </div>
    </aside>

    <script src="js/auth.js"></script>
    <script type="module" src="js/pages/colaboradores.js"></script>
</body>
</html>
