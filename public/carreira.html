
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajetória de Carreira | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { red: '#D32F2F', darkRed: '#B71C1C', black: '#121212', gray: '#F4F7F9' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/carreira.css">
    <link rel="stylesheet" href="css/tutorial.css">
</head>
<body class="bg-nordeste-gray h-screen flex overflow-hidden">
    <aside class="sidebar-nav">
        <div class="p-6 border-b bg-white">
            <div class="flex items-center gap-3 mb-6"><a href="/" class="p-2 bg-nordeste-black text-white rounded-lg">🏠</a><h1 class="text-xs font-black uppercase italic text-gray-800 leading-none">Gestão de <span class="text-nordeste-red">Carreira</span></h1></div>
            <div class="bg-gray-100 p-1 rounded-2xl flex mb-6"><div id="tab-active" onclick="window.setFilterStatus('active')" class="tab-btn active">Ativos</div><div id="tab-inactive" onclick="window.setFilterStatus('inactive')" class="tab-btn inactive">Desligados</div></div>
            <div class="relative"><input type="text" id="emp-search" oninput="filterList()" placeholder="Buscar nome ou matrícula..." class="w-full pl-10 pr-4 py-3 bg-gray-100 border-none rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-nordeste-red transition-all"><svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
        </div>
        <div id="employees-list" class="flex-1 overflow-y-auto custom-scroll bg-white"></div>
        <div class="p-6 border-t bg-gray-50"><button onclick="window.openBulkAdjustment()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg hover:bg-green-700 transition-all">💲 Reajuste Coletivo</button></div>
    </aside>
    <main class="main-container flex-1 overflow-y-auto custom-scroll">
        <div id="welcome-msg" class="h-full flex flex-col items-center justify-center text-gray-300"><div class="w-24 h-24 bg-gray-200 rounded-[2.5rem] flex items-center justify-center mb-6 opacity-40"><svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></div><p class="font-black uppercase text-xs tracking-widest italic">Selecione um colaborador para gerenciar a trajetória</p></div>
        <div id="selection-view" class="hidden animate-fade max-w-6xl mx-auto w-full">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="space-y-6">
                    <div class="bg-white rounded-[2.5rem] p-8 border-2 border-nordeste-red shadow-xl flex flex-col items-center"><img id="view-photo" src="" class="w-32 h-32 rounded-[2rem] object-cover border-4 border-white shadow-2xl mb-6"><h2 id="view-name" class="text-lg font-black text-gray-800 uppercase italic text-center leading-tight">...</h2><span id="view-reg" class="bg-gray-100 px-3 py-1 rounded-lg text-[9px] font-mono font-bold text-gray-400 mt-2">#0000</span><div class="w-full mt-8 pt-8 border-t border-gray-50 space-y-4"><div><p class="text-[8px] font-black text-gray-400 uppercase">Posição Atual</p><p id="view-role" class="text-xs font-black text-nordeste-red uppercase italic leading-tight">...</p></div><div><p class="text-[8px] font-black text-gray-400 uppercase">Salário Atual</p><p id="view-salary" class="text-lg font-black text-gray-800 tabular-nums">R$ 0,00</p></div></div></div>
                    <div class="bg-nordeste-black rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden"><div class="absolute top-[-10px] right-[-10px] text-6xl opacity-10 rotate-12">📈</div><p class="text-[9px] font-black text-nordeste-red uppercase tracking-widest mb-1">Evolução na Nordeste</p><h3 id="view-variation" class="text-4xl font-black italic">+0.0%</h3><p class="text-[8px] text-gray-400 font-bold uppercase mt-2">Aumento acumulado total</p></div>
                </div>
                <div class="lg:col-span-2 space-y-8">
                    <div class="flex flex-wrap gap-3"><button onclick="window.openPromotionModal()" class="flex-1 bg-nordeste-black text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2"><span>💼</span> Promoção / Cargo</button><button onclick="window.openBonusModal()" class="flex-1 bg-amber-500 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2"><span>🏆</span> Bonificação</button><button onclick="window.openOccurrenceModal()" class="flex-1 bg-nordeste-red text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2"><span>⚠️</span> Ocorrência</button></div>
                    <div id="career-timeline" class="space-y-8 relative pl-10 border-l-2 border-gray-200 ml-5"></div>
                </div>
            </div>
        </div>
    </main>
    <div id="pro-modal-container" class="hidden fixed inset-0 z-[200] bg-nordeste-black/90 backdrop-blur-sm flex items-center justify-center p-4"><div id="pro-modal-content" class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-y-auto max-h-[90vh] animate-pop border border-white/20"></div></div>
    <script src="js/auth.js"></script>
    <script type="module" src="js/tutorial/engine.js"></script>
    <script type="module" src="js/pages/carreira-module.js"></script>
</body>
</html>
