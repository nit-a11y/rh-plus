
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejamento Estratégico de Férias | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { red: '#D32F2F', darkRed: '#B71C1C', black: '#121212', gray: '#F8FAFC' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/vacation-planning.css">
</head>
<body class="bg-[#F1F5F9] h-screen flex flex-col overflow-hidden">

    <!-- HEADER ESTRATÉGICO -->
    <header class="bg-nordeste-black text-white px-6 py-3 flex justify-between items-center shadow-2xl z-50 h-16 flex-shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="location.href='/vacation-unified.html'" class="p-2 hover:bg-white/10 rounded-xl transition-all text-gray-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </button>
            <div>
                <h1 class="text-sm font-black uppercase italic tracking-tighter">Planejamento <span class="text-nordeste-red">Capacidade & Férias</span></h1>
                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Gantt Anual Inteligente</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <!-- LEGENDA RÁPIDA -->
            <div class="hidden md:flex gap-3 mr-4 bg-white/5 p-1.5 rounded-lg border border-white/10">
                <div class="flex items-center gap-1.5 px-2"><div class="w-2 h-2 rounded-full bg-yellow-500"></div><span class="text-[9px] font-bold uppercase text-gray-300">Planejado</span></div>
                <div class="flex items-center gap-1.5 px-2"><div class="w-2 h-2 rounded-full bg-green-500"></div><span class="text-[9px] font-bold uppercase text-gray-300">Agendado</span></div>
                <div class="flex items-center gap-1.5 px-2"><div class="w-2 h-2 rounded-full bg-blue-500"></div><span class="text-[9px] font-bold uppercase text-gray-300">Em Gozo</span></div>
                <div class="flex items-center gap-1.5 px-2 border-l border-white/10"><div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div><span class="text-[9px] font-bold uppercase text-red-400">Conflito Setorial</span></div>
            </div>

            <div class="flex bg-nordeste-red rounded-lg p-0.5">
                <button onclick="changeYear(-1)" class="px-3 hover:bg-black/20 rounded-md transition-colors font-bold text-xs">◀</button>
                <span id="current-year-display" class="px-4 py-1.5 text-xs font-black uppercase min-w-[60px] text-center bg-black/20 rounded-md">2026</span>
                <button onclick="changeYear(1)" class="px-3 hover:bg-black/20 rounded-md transition-colors font-bold text-xs">▶</button>
            </div>
        </div>
    </header>

    <!-- LAYOUT TRIPLO: SIDEBAR COLABORADOR | TIMELINE | SIDEBAR CAPACIDADE -->
    <main class="flex-1 overflow-hidden flex flex-col relative">
        <!-- HEADER DA TIMELINE (FIXO) -->
        <div class="bg-white border-b shadow-sm flex flex-shrink-0 z-40">
            <div class="w-[260px] flex-shrink-0 border-r border-gray-200 bg-gray-50 flex items-center px-4">
                <span class="text-[9px] font-black text-gray-400 uppercase">Estrutura Organizacional</span>
            </div>
            <div class="flex-1 overflow-hidden relative" id="header-container">
                <div class="flex" id="timeline-days-header"></div>
            </div>
            <div class="w-[200px] flex-shrink-0 border-l border-gray-200 bg-gray-50 flex items-center justify-center">
                <span class="text-[9px] font-black text-gray-400 uppercase">Saúde Operacional</span>
            </div>
        </div>

        <!-- CORPO SCROLLÁVEL -->
        <div class="flex-1 overflow-y-auto custom-scroll" id="main-scroll-area">
            <div class="flex min-h-full">
                <!-- Coluna Esquerda: Nomes -->
                <div class="w-[260px] flex-shrink-0 border-r border-gray-200 bg-white z-30" id="sidebar-employees"></div>
                
                <!-- Centro: Timeline -->
                <div class="flex-1 overflow-x-auto custom-scroll-x relative bg-white" id="timeline-body-scroll">
                    <div id="timeline-grid-track" class="h-full min-w-max"></div>
                </div>

                <!-- Coluna Direita: Capacidade -->
                <div class="w-[200px] flex-shrink-0 border-l border-gray-200 bg-white z-30" id="sidebar-capacity"></div>
            </div>
        </div>
    </main>

    <div id="plan-tooltip" class="hidden fixed pointer-events-none z-[100] bg-nordeste-black text-white p-4 rounded-2xl shadow-2xl border border-white/10 text-[10px] font-bold uppercase max-w-xs"></div>

    <script type="module" src="js/pages/vacation-planning.js"></script>
</body>
</html>
