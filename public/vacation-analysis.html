
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Aptos | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { red: '#D32F2F', darkRed: '#B71C1C', black: '#121212', gray: '#F1F5F9' },
                        status: { vencido: '#EF4444', alerta: '#F59E0B', emdia: '#10B981', carencia: '#94a3b8' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/vacation-analysis.css">
</head>
<body class="bg-nordeste-gray h-screen flex flex-col overflow-hidden">
    <header class="bg-nordeste-black text-white px-8 py-5 flex justify-between items-center shadow-2xl z-50">
        <div class="flex items-center gap-6">
            <button onclick="location.href='/vacation-unified.html'" class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl transition-all border border-white/10 group">
                <svg class="w-4 h-4 text-nordeste-red group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="text-[10px] font-black uppercase tracking-widest">Voltar</span>
            </button>
            <div class="h-10 w-px bg-white/10"></div>
            <div>
                <h1 class="text-xl font-black uppercase italic tracking-tighter">Análise de <span class="text-nordeste-red">Elegibilidade</span></h1>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Distribuição Baseada em Ciclos 18/6 e Anuais</p>
            </div>
        </div>
        <div class="w-10 h-10 rounded-xl bg-nordeste-red flex items-center justify-center font-black shadow-lg">RH</div>
    </header>

    <nav class="bg-white border-b p-8 shadow-sm">
        <div class="max-w-screen-2xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="analysis-kpi bg-green-50 border-l-4 border-status-emdia"><span class="kpi-label">Aptos</span><h3 id="kpi-apto" class="kpi-value text-green-700">0</h3></div>
            <div class="analysis-kpi bg-red-50 border-l-4 border-status-vencido"><span class="kpi-label">Risco Crítico</span><h3 id="kpi-risco" class="kpi-value text-red-700">0</h3></div>
            <div class="analysis-kpi bg-amber-50 border-l-4 border-status-alerta"><span class="kpi-label">Janela Obrigatória</span><h3 id="kpi-janela" class="kpi-value text-amber-700">0</h3></div>
            <div class="analysis-kpi bg-gray-50 border-l-4 border-status-carencia"><span class="kpi-label">Em Carência</span><h3 id="kpi-carencia" class="kpi-value text-gray-500">0</h3></div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-10 custom-scroll">
        <div id="sectors-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="analysis-overlay" class="hidden fixed inset-0 z-[100] bg-nordeste-black/80 backdrop-blur-md flex justify-end">
        <aside class="w-full max-w-2xl bg-white h-full shadow-2xl flex flex-col animate-slide-left">
            <header class="p-8 bg-nordeste-black text-white flex justify-between items-center">
                <h3 class="text-2xl font-black uppercase italic leading-none" id="modal-sector-tag">...</h3>
                <button onclick="closeAnalysisModal()" class="text-white/40 hover:text-white transition-all text-2xl">✕</button>
            </header>
            <div class="flex-1 overflow-y-auto p-10 custom-scroll">
                <div id="sector-employees-list" class="space-y-3"></div>
            </div>
        </aside>
    </div>

    <script type="module" src="js/pages/vacation-analysis.js"></script>
</body>
</html>
