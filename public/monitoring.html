<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Avançado | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: {
                            red: '#D32F2F',
                            darkRed: '#B71C1C',
                            black: '#121212',
                            gray: '#F4F7F9',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #F4F7F9;
        }

        .monitoring-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e5e7eb;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .monitoring-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: #dcfce7;
            color: #15803d;
        }

        .status-inactive {
            background: #fee2e2;
            color: #b91c1c;
        }

        .priority-high {
            background: #fef3c7;
            color: #b45309;
        }

        .priority-medium {
            background: #dbeafe;
            color: #1e40af;
        }

        .priority-low {
            background: #f3f4f6;
            color: #6b7280;
        }

        .module-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            background: #f1f5f9;
            color: #374151;
        }

        .event-timeline {
            position: relative;
            padding-left: 2rem;
        }

        .event-timeline::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }

        .event-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .event-item::before {
            content: '';
            position: absolute;
            left: -1.75rem;
            top: 0.25rem;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: #D32F2F;
            border: 2px solid white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid #cbd5e1;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="bg-nordeste-black text-white w-72 flex flex-col shadow-2xl z-50 flex-shrink-0">
        <div class="h-24 flex items-center px-8 border-b border-white/5 bg-nordeste-darkRed">
            <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center mr-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter">NORDESTE <span class="text-red-400">RH+</span></h1>
        </div>

        <nav class="flex-1 p-5 space-y-2 mt-4">
            <a href="/dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                <span>🏠</span> Dashboard
            </a>
            <a href="/monitoring.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl bg-nordeste-red text-white">
                <span>📊</span> Monitoramento
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 h-20 flex items-center justify-between px-12">
            <div>
                <h2 class="text-lg font-black text-gray-800 uppercase italic tracking-tight">Monitoramento Avançado</h2>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Sistema Personalizado de Eventos</p>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="loadMonitoringRules()" class="bg-nordeste-red text-white px-4 py-2 rounded-xl font-black text-xs hover:bg-nordeste-darkRed transition-all">
                    🔄 Atualizar
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-8">
            <!-- Stats Overview -->
            <div class="stats-grid mb-8">
                <div class="stat-card">
                    <div class="stat-value" id="total-rules">0</div>
                    <div class="stat-label">Regras Ativas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-events">0</div>
                    <div class="stat-label">Eventos Hoje</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-modules">0</div>
                    <div class="stat-label">Módulos Monitorados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="success-rate">0%</div>
                    <div class="stat-label">Taxa de Sucesso</div>
                </div>
            </div>

            <!-- Rules Management -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-gray-800 uppercase italic">Regras de Monitoramento</h3>
                    <button onclick="openAddRuleModal()" class="bg-nordeste-red text-white px-4 py-2 rounded-xl font-black text-xs hover:bg-nordeste-darkRed transition-all">
                        ➕ Nova Regra
                    </button>
                </div>

                <div id="rules-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Rules will be loaded here -->
                </div>
            </div>

            <!-- Recent Events -->
            <div>
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-gray-800 uppercase italic">Eventos Recentes</h3>
                    <select id="module-filter" onchange="loadEvents()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">Todos os Módulos</option>
                        <option value="vacation">Férias</option>
                        <option value="career">Carreira</option>
                        <option value="employees">Colaboradores</option>
                        <option value="goals">Metas</option>
                    </select>
                </div>

                <div id="events-container" class="event-timeline">
                    <!-- Events will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Container -->
    <div id="modal-container" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-md flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/monitoring.js"></script>
</body>
</html>
