
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { 
                            softRed: '#E57373', 
                            coral: '#F06292',
                            dark: '#334155',
                            pastel: '#FFF8F8' 
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="stylesheet" href="css/tutorial.css">
</head>
<body class="bg-nordeste-pastel min-h-screen flex flex-col overflow-x-hidden custom-scroll">

    <!-- HEADER MINIMALISTA -->
    <header class="sticky top-0 bg-white/70 backdrop-blur-md border-b border-rose-100/50 px-6 py-4 flex justify-between items-center z-[100]">
        <div class="flex items-center gap-4">
            <a href="/" class="p-2.5 hover:bg-rose-50 rounded-2xl transition-all group shadow-sm bg-white border border-rose-50">
                <svg class="w-5 h-5 text-nordeste-softRed group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </a>
            <div>
                <h1 class="text-lg font-black uppercase italic tracking-tighter text-nordeste-dark">Perfil <span class="text-nordeste-softRed">Pessoal</span></h1>
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-[0.2em]">Configurações da sua conta</p>
            </div>
        </div>
        <div id="header-user-badge" class="flex items-center gap-3 bg-white px-3 py-1.5 rounded-2xl border border-rose-50 shadow-sm">
             <span id="header-user-name" class="text-[10px] font-black text-slate-500 uppercase tracking-tighter">...</span>
             <div class="w-8 h-8 rounded-full bg-nordeste-softRed flex items-center justify-center font-black text-white text-[10px] overflow-hidden">
                 <img id="header-user-avatar" src="" class="w-full h-full object-cover hidden">
                 <span id="header-user-initials">?</span>
             </div>
        </div>
    </header>

    <main class="flex-1 flex justify-center py-10 md:py-16">
        <div class="w-full max-w-2xl px-6 space-y-8 pb-24">
            
            <!-- SEÇÃO 01: IDENTIDADE VISUAL -->
            <section class="section-card animate-fade-in" style="animation-delay: 0.1s;">
                <div class="flex flex-col items-center py-4">
                    <div class="profile-avatar-container" onclick="document.getElementById('avatar-input').click()">
                        <img id="profile-preview" src="" class="w-40 h-40 rounded-[3.5rem] object-cover border-8 border-white shadow-xl bg-white">
                        <div class="profile-avatar-overlay">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812-1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="window.previewAvatar(this)">
                    </div>
                    <h2 class="text-sm font-black text-slate-700 uppercase mt-4 tracking-widest" id="display-name-label">...</h2>
                    <button onclick="window.removeAvatar()" class="text-[9px] font-black text-rose-300 uppercase mt-2 hover:text-nordeste-softRed transition-colors">Redefinir foto padrão</button>
                </div>
            </section>

            <!-- SEÇÃO 02: DADOS CADASTRAIS -->
            <section class="section-card animate-fade-in" style="animation-delay: 0.2s;">
                <h3 class="section-title">
                    <span class="title-icon">👤</span> Dados Cadastrais
                </h3>
                <div class="space-y-6">
                    <div class="input-container">
                        <label class="pro-label">Seu Nome Completo</label>
                        <input type="text" id="user-fullname" class="pro-input" placeholder="Ex: Maria Oliveira">
                    </div>
                    <div class="input-container">
                        <label class="pro-label">ID de Usuário (Login)</label>
                        <div class="relative">
                            <input type="text" id="user-login" class="pro-input bg-slate-50/50 text-slate-400 cursor-not-allowed border-dashed" readonly>
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-300 font-bold uppercase italic">Bloqueado</span>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button onclick="window.saveBasicInfo()" id="btn-save-basic" class="btn-primary-soft">Salvar Alterações</button>
                    </div>
                </div>
            </section>

            <!-- SEÇÃO 03: SEGURANÇA -->
            <section class="section-card animate-fade-in" style="animation-delay: 0.3s;">
                <h3 class="section-title">
                    <span class="title-icon">🔐</span> Alterar Senha de Acesso
                </h3>
                <div class="space-y-6">
                    <div class="input-container">
                        <label class="pro-label">Senha Atual</label>
                        <input type="password" id="pass-current" class="pro-input" placeholder="••••••••">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="input-container">
                            <label class="pro-label">Nova Senha</label>
                            <input type="password" id="pass-new" class="pro-input" placeholder="Nova senha" oninput="window.checkPasswordStrength()">
                        </div>
                        <div class="input-container">
                            <label class="pro-label">Repetir Nova Senha</label>
                            <input type="password" id="pass-confirm" class="pro-input" placeholder="Confirmação">
                        </div>
                    </div>

                    <!-- INDICADOR DE FORÇA -->
                    <div class="p-6 bg-slate-50/80 rounded-3xl border border-slate-100">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Requisitos de Segurança</span>
                            <span id="strength-label" class="text-[9px] font-black text-nordeste-softRed uppercase italic">Pendente</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden mb-4">
                            <div id="strength-fill" class="h-full w-0 bg-nordeste-softRed transition-all duration-500"></div>
                        </div>
                        <ul class="flex flex-wrap gap-x-6 gap-y-2">
                            <li id="check-length" class="check-item"><span class="dot"></span> Mín. 6 caracteres</li>
                            <li id="check-match" class="check-item"><span class="dot"></span> Senhas iguais</li>
                        </ul>
                    </div>

                    <button onclick="window.saveNewPassword()" id="btn-save-pass" class="btn-secondary-soft">Atualizar Senha de Acesso</button>
                </div>
            </section>

            <footer class="text-center pb-10">
                <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.4em]">Nordeste RH+ • Ecosystem v2.0</p>
            </footer>

        </div>
    </main>

    <!-- NOTIFICAÇÕES (GENTLE TOAST) -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] px-8 py-3.5 rounded-3xl font-black text-[10px] uppercase shadow-2xl transition-all duration-500 opacity-0 translate-y-10 pointer-events-none scale-90"></div>

    <script src="js/auth.js"></script>
    <script type="module" src="js/tutorial/engine.js"></script>
    <script type="module" src="js/pages/perfil.js"></script>
</body>
</html>
