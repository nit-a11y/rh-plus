
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador de Enxovais | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { red: '#D32F2F', darkRed: '#B71C1C', black: '#121212', gray: '#F4F7F9' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F4F7F9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .pro-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .pro-input { width: 100%; padding: 12px 15px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 12px; font-weight: 700; outline: none; transition: border 0.2s; }
        .pro-input:focus { border-color: #D32F2F; }

        .hidden-pro { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-nordeste-black text-white px-10 py-6 flex justify-between items-center z-50 shadow-xl">
        <div class="flex items-center gap-6">
            <button onclick="location.href='/fardamento'" class="p-2 hover:bg-white/10 rounded-xl transition-all group">
                <svg class="w-6 h-6 text-nordeste-red group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </button>
            <div class="h-10 w-px bg-white/10"></div>
            <div>
                <h1 class="text-xl font-black uppercase italic tracking-tighter">Kits de <span class="text-nordeste-red">Enxoval</span></h1>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Configurador Estratégico de Fardamento e EPIs</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="window.openNewKitModal()" class="bg-nordeste-red hover:bg-red-700 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase shadow-xl transition-all active:scale-95 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                Configurar Novo Kit
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-12 custom-scroll">
        <div class="max-w-6xl mx-auto space-y-10">
            <div id="kits-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Cards injetados via JS -->
            </div>
        </div>
    </main>

    <!-- Modais -->
    <div id="pro-modal-container" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="pro-modal-content" class="bg-white rounded-[2.5rem] w-full max-w-lg shadow-2xl overflow-hidden animate-pop"></div>
    </div>

    <script src="js/auth.js"></script>
    <script type="module" src="js/pages/kits-pro.js"></script>
</body>
</html>
