<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Transferências - RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pro-input { @apply w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all; }
        .pro-label { @apply block text-sm font-bold text-gray-700 mb-2; }
        .btn-action { @apply px-4 py-2 rounded-lg font-bold transition-all; }
        .hidden-pro { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-gradient-to-r from-orange-500 to-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-exchange-alt text-2xl"></i>
                    <h1 class="text-2xl font-bold">Gestão de Transferências</h1>
                </div>
                <nav class="flex space-x-4">
                    <a href="/" class="hover:bg-white/20 px-3 py-2 rounded transition-all">
                        <i class="fas fa-home mr-2"></i>Início
                    </a>
                    <a href="/colaboradores" class="hover:bg-white/20 px-3 py-2 rounded transition-all">
                        <i class="fas fa-users mr-2"></i>Colaboradores
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <!-- Estatísticas -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Transferências Hoje</p>
                        <p class="text-2xl font-bold text-gray-800" id="today-transfers">0</p>
                    </div>
                    <i class="fas fa-calendar-day text-blue-500 text-2xl"></i>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Este Mês</p>
                        <p class="text-2xl font-bold text-gray-800" id="month-transfers">0</p>
                    </div>
                    <i class="fas fa-calendar-alt text-green-500 text-2xl"></i>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-orange-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Empregadores</p>
                        <p class="text-2xl font-bold text-gray-800" id="employer-changes">0</p>
                    </div>
                    <i class="fas fa-building text-orange-500 text-2xl"></i>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Unidades</p>
                        <p class="text-2xl font-bold text-gray-800" id="workplace-changes">0</p>
                    </div>
                    <i class="fas fa-map-marker-alt text-purple-500 text-2xl"></i>
                </div>
            </div>
        </div>

        <!-- Filtros e Busca -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="pro-label">Buscar Colaborador</label>
                    <input type="text" id="search-employee" class="pro-input" 
                        placeholder="Nome ou matrícula..." onkeyup="filterTransfers()">
                </div>
                
                <div>
                    <label class="pro-label">Período</label>
                    <select id="period-filter" class="pro-input" onchange="filterTransfers()">
                        <option value="all">Todos</option>
                        <option value="today">Hoje</option>
                        <option value="week">Esta Semana</option>
                        <option value="month">Este Mês</option>
                    </select>
                </div>
                
                <div>
                    <label class="pro-label">Tipo</label>
                    <select id="type-filter" class="pro-input" onchange="filterTransfers()">
                        <option value="all">Todos</option>
                        <option value="employer">Apenas Empregador</option>
                        <option value="workplace">Apenas Unidade</option>
                        <option value="both">Ambos</option>
                    </select>
                </div>
                
                <div class="flex items-end">
                    <button onclick="loadTransfers()" 
                        class="btn-action bg-blue-600 text-white w-full hover:bg-blue-700">
                        <i class="fas fa-search mr-2"></i>Buscar
                    </button>
                </div>
            </div>
        </div>

        <!-- Lista de Transferências -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-gradient-to-r from-orange-500 to-blue-600 text-white p-6">
                <h2 class="text-xl font-bold">
                    <i class="fas fa-history mr-2"></i>Histórico de Transferências
                </h2>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Colaborador</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Transferência</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Responsável</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Motivo</th>
                        </tr>
                    </thead>
                    <tbody id="transfers-table-body" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                                <i class="fas fa-spinner fa-spin text-2xl mb-4"></i>
                                <p>Carregando transferências...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="pro-modal-container" class="hidden-pro fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div id="pro-modal-content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/pages/transfer-module.js"></script>
    <script>
        let allTransfers = [];

        // Carregar transferências
        async function loadTransfers() {
            try {
                const res = await fetch('/api/transfers/all');
                allTransfers = await res.json();
                renderTransfers();
                updateStatistics();
            } catch (error) {
                console.error('Erro ao carregar transferências:', error);
                document.getElementById('transfers-table-body').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-red-500">
                            <i class="fas fa-exclamation-triangle text-2xl mb-4"></i>
                            <p>Erro ao carregar transferências</p>
                        </td>
                    </tr>
                `;
            }
        }

        // Renderizar transferências
        function renderTransfers(transfers = allTransfers) {
            const tbody = document.getElementById('transfers-table-body');
            
            if (transfers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                            <i class="fas fa-inbox text-2xl mb-4"></i>
                            <p>Nenhuma transferência encontrada</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = transfers.map(t => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${formatDate(t.changed_at)}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${t.employee_name}</div>
                        <div class="text-sm text-gray-500">${t.registrationNumber}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm">
                            <div class="flex items-center space-x-2 mb-1">
                                <i class="fas fa-arrow-right text-blue-500"></i>
                                <span class="font-medium">${t.from_employer_name || 'N/A'} → ${t.to_employer_name || 'N/A'}</span>
                            </div>
                            ${t.from_workplace_name !== t.to_workplace_name ? `
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-map-marker-alt text-purple-500"></i>
                                    <span>${t.from_workplace_name || 'N/A'} → ${t.to_workplace_name || 'N/A'}</span>
                                </div>
                            ` : ''}
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${t.changed_by}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-900 max-w-xs truncate" title="${t.observation || 'Sem motivo informado'}">
                            ${t.observation || 'Sem motivo informado'}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Filtrar transferências
        function filterTransfers() {
            const searchTerm = document.getElementById('search-employee').value.toLowerCase();
            const period = document.getElementById('period-filter').value;
            const type = document.getElementById('type-filter').value;
            
            let filtered = allTransfers;
            
            // Filtrar por nome/matrícula
            if (searchTerm) {
                filtered = filtered.filter(t => 
                    t.employee_name.toLowerCase().includes(searchTerm) ||
                    t.registrationNumber.toLowerCase().includes(searchTerm)
                );
            }
            
            // Filtrar por período
            if (period !== 'all') {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                filtered = filtered.filter(t => {
                    const transferDate = new Date(t.changed_at);
                    
                    switch(period) {
                        case 'today':
                            return transferDate >= today;
                        case 'week':
                            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                            return transferDate >= weekAgo;
                        case 'month':
                            const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
                            return transferDate >= monthAgo;
                        default:
                            return true;
                    }
                });
            }
            
            // Filtrar por tipo
            if (type !== 'all') {
                filtered = filtered.filter(t => {
                    const employerChanged = t.from_employer_id !== t.to_employer_id;
                    const workplaceChanged = t.from_workplace_id !== t.to_workplace_id;
                    
                    switch(type) {
                        case 'employer':
                            return employerChanged && !workplaceChanged;
                        case 'workplace':
                            return workplaceChanged && !employerChanged;
                        case 'both':
                            return employerChanged && workplaceChanged;
                        default:
                            return true;
                    }
                });
            }
            
            renderTransfers(filtered);
        }

        // Atualizar estatísticas
        function updateStatistics() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            
            const todayTransfers = allTransfers.filter(t => new Date(t.changed_at) >= today);
            const monthTransfers = allTransfers.filter(t => new Date(t.changed_at) >= monthStart);
            const employerChanges = allTransfers.filter(t => t.from_employer_id !== t.to_employer_id);
            const workplaceChanges = allTransfers.filter(t => t.from_workplace_id !== t.to_workplace_id);
            
            document.getElementById('today-transfers').textContent = todayTransfers.length;
            document.getElementById('month-transfers').textContent = monthTransfers.length;
            document.getElementById('employer-changes').textContent = employerChanges.length;
            document.getElementById('workplace-changes').textContent = workplaceChanges.length;
        }

        // Formatar data
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Fechar modal
        window.closeProModal = function() {
            document.getElementById('pro-modal-container').classList.add('hidden-pro');
        };

        // Carregar dados ao iniciar
        document.addEventListener('DOMContentLoaded', loadTransfers);
    </script>
</body>
</html>
