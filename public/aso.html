
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Master | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordeste: { red: '#D32F2F', darkRed: '#B71C1C', black: '#121212', gray: '#F8FAFC' },
                        status: { vencido: '#EF4444', alerta: '#F59E0B', emdia: '#10B981', pendente: '#64748B', info: '#3B82F6' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/vacation-pro.css">
    <link rel="stylesheet" href="css/vacation-dossier.css">
    <link rel="stylesheet" href="css/carreira.css">
    <link rel="stylesheet" href="css/tutorial.css">
    <style>
        .emp-item { padding: 1rem 1.5rem; border-bottom: 1px solid #F1F5F9; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .emp-item:hover { background: #F8FAFC; }
        .emp-item.active { background: #FFF1F2; border-left: 4px solid #D32F2F; }
        .main-container { padding: 2rem; }
    </style>
</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">
    
    <!-- SIDEBAR -->
    <aside class="sidebar-nav flex-shrink-0 w-72 flex flex-col z-50">
        <div class="p-6 border-b bg-white">
            <div class="flex items-center gap-3 mb-4">
                <a href="/" class="p-2 bg-nordeste-black text-white rounded-lg">🏠</a>
                <h1 class="text-xs font-black uppercase italic text-gray-800 leading-none">Gestão de <span class="text-nordeste-red">Saúde (SST)</span></h1>
            </div>
            <div class="bg-gray-100 p-1 rounded-2xl flex mb-4"><div id="tab-active" onclick="window.setFilterStatus('active')" class="tab-btn active">Ativos</div><div id="tab-inactive" onclick="window.setFilterStatus('inactive')" class="tab-btn inactive">Desligados</div></div>
            <div class="relative">
                <input type="text" id="dossier-search" oninput="debounceSearch()" onkeydown="handleSearchKeydown(event)" placeholder="Buscar..." class="w-full pl-10 pr-4 py-3 bg-gray-100 border-none rounded-2xl text-xs font-bold outline-none">
                <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
        
        <div id="dossier-employee-list" class="flex-1 overflow-y-auto bg-white custom-scroll"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-container flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <!-- WELCOME -->
        <div id="welcome-msg" class="h-full flex flex-col items-center justify-center text-gray-300">
            <div class="w-24 h-24 bg-gray-200 rounded-[2.5rem] flex items-center justify-center mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
            </div>
            <p class="font-black uppercase text-xs tracking-widest italic">Selecione um colaborador para gerenciar ASO</p>
        </div>

        <!-- SELECTION VIEW -->
        <div id="selection-view" class="hidden animate-fade max-w-6xl mx-auto w-full">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- COLUNA 1: Card Colaborador -->
                <div class="space-y-6">
                    <div class="bg-white rounded-[2.5rem] p-6 border-2 border-nordeste-red shadow-xl flex flex-col items-center">
                        <img id="view-photo" src="" class="w-24 h-24 rounded-[2rem] object-cover border-4 border-white shadow-2xl mb-4">
                        <h2 id="view-name" class="text-lg font-black text-gray-800 uppercase italic text-center">...</h2>
                        <span id="view-reg" class="bg-gray-100 px-3 py-1 rounded-lg text-[9px] font-mono font-bold text-gray-400 mt-2">#0000</span>
                        
                        <div class="w-full mt-6 pt-6 border-t border-gray-50 space-y-3">
                            <div><p class="text-[8px] font-black text-gray-400 uppercase">Setor</p><p id="view-sector" class="text-xs font-black text-gray-800">...</p></div>
                            <div><p class="text-[8px] font-black text-gray-400 uppercase">Admissão</p><p id="view-admission" class="text-xs font-black text-gray-600">...</p></div>
                            <div><p class="text-[8px] font-black text-gray-400 uppercase">Último ASO</p><p id="view-last-aso" class="text-xs font-black text-gray-600">--</p></div>
                        </div>
                    </div>

                    <div class="bg-nordeste-black rounded-[2rem] p-6 text-white shadow-xl">
                        <p class="text-[9px] font-black text-nordeste-red uppercase tracking-widest mb-3">Resumo Saúde</p>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-2xl font-black" id="stat-total">0</p><p class="text-[8px] text-gray-400 uppercase">Registros</p></div>
                            <div><p class="text-2xl font-black" id="stat-status">--</p><p class="text-[8px] text-gray-400 uppercase">Status</p></div>
                        </div>
                    </div>
                </div>

                <!-- COLUNA 2: Timeline -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="flex flex-wrap gap-3">
                        <button onclick="openNewAsoModal()" class="flex-1 bg-nordeste-red text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
                            <span>🩺</span> Novo ASO
                        </button>
                        <button onclick="openNewCertificateModal()" class="flex-1 bg-blue-600 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
                            <span>📋</span> Novo Atestado
                        </button>
                    </div>

                    <div class="dossier-filters">
                        <button class="dossier-filter-btn active" data-filter="all" onclick="setTimelineFilter('all', this)">Todos</button>
                        <button class="dossier-filter-btn" data-filter="ASO" onclick="setTimelineFilter('ASO', this)">ASO</button>
                        <button class="dossier-filter-btn" data-filter="ATESTADO" onclick="setTimelineFilter('ATESTADO', this)">Atestados</button>
                        <button class="dossier-filter-btn" data-filter="PERIODICO" onclick="setTimelineFilter('PERIODICO', this)">Periódico</button>
                        <button class="dossier-filter-btn" data-filter="ADMISSAO" onclick="setTimelineFilter('ADMISSAO', this)">Admissional</button>
                    </div>

                    <div id="aso-timeline" class="space-y-4 relative pl-8 border-l-2 border-gray-200 ml-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL: NOVO ASO -->
    <div id="aso-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden animate-pop">
            <div class="bg-nordeste-black p-6 text-white flex justify-between items-center">
                <div>
                    <h3 id="aso-modal-title" class="text-lg font-black uppercase italic">Novo ASO</h3>
                    <p id="aso-modal-subtitle" class="text-[10px] text-gray-400">Preencha os dados do exame</p>
                </div>
                <button onclick="closeAsoModal()" class="text-white/50 hover:text-white text-2xl">×</button>
            </div>
            <div class="p-6 space-y-5">
                <input type="hidden" id="aso-id">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="pro-label">Categoria</label>
                        <select id="aso-type" class="pro-input" onchange="updateDateRestrictions()">
                            <option value="PERIODICO">Periódico</option>
                            <option value="ADMISSAO">Admissional</option>
                            <option value="DEMISSAO">Demissional</option>
                            <option value="RETORNO">Retorno</option>
                            <option value="MUDANCA_FUNCAO">Mudança Função</option>
                        </select>
                    </div>
                    <div>
                        <label class="pro-label">Data do Exame</label>
                        <input type="date" id="aso-exam-date" class="pro-input">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="pro-label">Validade (Meses)</label>
                        <select id="aso-periodicity" class="pro-input">
                            <option value="6">6 meses</option>
                            <option value="12" selected>12 meses</option>
                            <option value="24">24 meses</option>
                        </select>
                    </div>
                    <div>
                        <label class="pro-label">Resultado</label>
                        <select id="aso-result" class="pro-input">
                            <option value="Apto">Apto</option>
                            <option value="Inapto">Inapto</option>
                            <option value="AptoRestricoes">Apto c/ Restrições</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="pro-label">🎯 CID / Descrição</label>
                    <input type="text" id="aso-cid" class="pro-input" placeholder="Código CID-10 ou descrição">
                </div>

                <div>
                    <label class="pro-label">📝 Observações</label>
                    <textarea id="aso-obs" class="pro-input h-20" placeholder="Observações do exame..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="deleteAso()" id="btn-delete-aso" class="hidden flex-1 py-3 bg-red-50 text-red-600 rounded-xl font-black text-xs uppercase border border-red-200 hover:bg-red-100">🗑️ Excluir</button>
                    <button onclick="closeAsoModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-black text-xs uppercase hover:bg-gray-200">Cancelar</button>
                    <button onclick="submitAso()" class="flex-1 py-3 bg-nordeste-red text-white rounded-xl font-black text-xs uppercase shadow-lg hover:bg-nordeste-darkRed">💾 Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: NOVO ATESTADO -->
    <div id="certificate-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden animate-pop">
            <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
                <div>
                    <h3 id="cert-modal-title" class="text-lg font-black uppercase italic">Novo Atestado</h3>
                    <p id="cert-modal-subtitle" class="text-[10px] text-gray-300">Registre o atestado médico</p>
                </div>
                <button onclick="closeCertificateModal()" class="text-white/50 hover:text-white text-2xl">×</button>
            </div>
            <div class="p-6 space-y-5">
                <input type="hidden" id="cert-id">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="pro-label">Data Início</label>
                        <input type="date" id="cert-start" class="pro-input">
                    </div>
                    <div>
                        <label class="pro-label">Data Fim</label>
                        <input type="date" id="cert-end" class="pro-input">
                    </div>
                </div>

                <div>
                    <label class="pro-label">🔢 CID / Diagnóstico</label>
                    <input type="text" id="cert-cid" class="pro-input" placeholder="Código CID-10">
                </div>

                <div>
                    <label class="pro-label">📝 Observações</label>
                    <textarea id="cert-obs" class="pro-input h-20" placeholder="Observações do atestado..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="deleteCertificate()" id="btn-delete-cert" class="hidden flex-1 py-3 bg-red-50 text-red-600 rounded-xl font-black text-xs uppercase border border-red-200 hover:bg-red-100">🗑️ Excluir</button>
                    <button onclick="closeCertificateModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-black text-xs uppercase hover:bg-gray-200">Cancelar</button>
                    <button onclick="submitCertificate()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-xs uppercase shadow-lg hover:bg-blue-700">💾 Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script type="module" src="js/tutorial/engine.js"></script>
    <script type="module" src="js/pages/aso-unified.js"></script>
</body>
</html>
