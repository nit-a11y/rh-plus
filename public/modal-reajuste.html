<div class="nrh-premium-modal">
    <style>
        .nrh-modal-wrapper {
            font-family: 'Inter', sans-serif;
            display: flex;

            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nrh-header {

            padding: 2.5rem;
            color: white;
            border-bottom: 5px solid #D32F2F;
            position: relative;
        }
        .nrh-header h3 {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-style: italic;
            margin: 0;
        }
        .nrh-header p {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #D32F2F;
            margin-top: 5px;
        }
        .nrh-body {
            padding: 2.5rem;
            background: #fff;

            transition: all 0.3s;
        }

            background: #fff;
            box-shadow: 0 10px 20px rgba(211, 47, 47, 0.05);
        }

            border: none;

            font-weight: 900;
            color: #D32F2F;
            width: 200px;
            text-align: center;
            outline: none;

            color: #CBD5E1;
        }
