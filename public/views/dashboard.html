<div class="bg-nordeste-black text-white p-6 rounded-xl shadow-md flex flex-col md:flex-row items-center justify-between">
    <div>
        <h2 class="text-2xl font-bold mb-1">Visão Geral</h2>
        <p class="text-gray-400">Monitoramento de Fardamento e Gestão de Pessoas.</p>
    </div>
    <div class="flex gap-4">
        <div class="text-center px-4 border-r border-gray-700">
            <span id="stat-total-colab" class="block text-3xl font-bold">0</span>
            <span class="text-xs text-gray-400 uppercase">Colaboradores</span>
        </div>
        <div class="text-center px-4">
            <span id="stat-total-items" class="block text-3xl font-bold">0</span>
            <span class="text-xs text-gray-400 uppercase">Fardamentos Ativos</span>
        </div>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="card p-6 border-l-4 border-green-500 flex justify-between items-center">
        <div><p class="text-gray-500 text-sm font-medium">Fardamentos em Dia</p><h3 id="stat-ok" class="text-3xl font-bold text-gray-800">0</h3></div>
        <div class="p-3 bg-green-100 rounded-full text-green-600"><i data-lucide="check-circle"></i></div>
    </div>
    <div class="card p-6 border-l-4 border-red-500 flex justify-between items-center">
        <div><p class="text-gray-500 text-sm font-medium">Fardamentos Vencidos</p><h3 id="stat-expired" class="text-3xl font-bold text-red-600">0</h3></div>
        <div class="p-3 bg-red-100 rounded-full text-red-600"><i data-lucide="alert-octagon"></i></div>
    </div>
    <div class="card p-6 border-l-4 border-yellow-500 flex justify-between items-center">
        <div><p class="text-gray-500 text-sm font-medium">Próximo Vencimento</p><h3 id="stat-warning" class="text-3xl font-bold text-yellow-600">0</h3></div>
        <div class="p-3 bg-yellow-100 rounded-full text-yellow-600"><i data-lucide="clock"></i></div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="card p-6"><h4 class="text-lg font-bold text-gray-800 mb-4">Saúde do Estoque</h4><div class="chart-container"><canvas id="chart-status"></canvas></div></div>
    <div class="card p-6"><h4 class="text-lg font-bold text-gray-800 mb-4">Fardamentos por Setor</h4><div class="chart-container"><canvas id="chart-sector"></canvas></div></div>
</div>
