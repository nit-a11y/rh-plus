<div class="card p-5 border border-gray-200 overflow-hidden">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
        <div class="flex items-center gap-4">
            <h3 class="font-bold text-lg text-gray-800">Colaboradores</h3>
            <div class="flex bg-gray-100 rounded-lg p-1 border border-gray-200">
                <button id="btn-emp-active" onclick="window.modules.employees.showActive()" class="px-4 py-1.5 rounded-md text-sm font-bold bg-white text-gray-800 shadow-sm transition-all">Ativos</button>
                <button id="btn-emp-archived" onclick="window.modules.employees.showArchived()" class="px-4 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition-all">Arquivados</button>
            </div>
        </div>
        
        <div class="flex gap-3 w-full md:w-auto">
            <input type="text" id="search-input" placeholder="Buscar por nome ou matrícula..." class="input-field w-full md:w-64">
            <button onclick="window.modules.employees.openNewEmployeeModal()" class="btn btn-primary flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Novo
            </button>
        </div>
    </div>
    <div class="table-container">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Colaborador</th>
                    <th>Setor</th>
                    <th class="text-center">Fardamentos</th>
                    <th class="text-center">Ocorrências</th>
                    <th class="text-center">Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="employee-table-body"></tbody>
        </table>
    </div>
</div>
