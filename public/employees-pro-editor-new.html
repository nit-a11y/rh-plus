
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Colaboradores | Nordeste RH+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .tab-btn.active {
            background-color: rgb(37 99 235);
            color: white;
        }
        .pro-input {
            @apply w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all;
        }
        .pro-label {
            @apply block text-xs font-bold text-gray-700 uppercase mb-1;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <span class="text-gray-700">Carregando...</span>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <button onclick="window.location.href='employees-pro.html'" class="text-gray-600 hover:text-gray-900">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h1 class="text-xl font-bold text-gray-900">Editor de Colaboradores</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="save-indicator" class="text-green-600 text-sm font-medium">
                        <i class="fas fa-check-circle text-green-500"></i> Salvo
                    </div>
                    <button id="save-employee-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                        <i class="fas fa-save mr-2"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tabs Navigation -->
        <div class="bg-white rounded-lg shadow-sm mb-6">
            <div class="border-b border-gray-200">
                <nav class="flex space-x-8 px-6" aria-label="Tabs">
                    <button onclick="EditorV2.switchTab('identity')" class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm hover:text-gray-700 hover:border-gray-300 active" data-tab="identity">
                        <i class="fas fa-user mr-2"></i> Identificação
                    </button>
                    <button onclick="EditorV2.switchTab('documents')" class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="documents">
                        <i class="fas fa-file-alt mr-2"></i> Documentos
                    </button>
                    <button onclick="EditorV2.switchTab('contract')" class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="contract">
                        <i class="fas fa-briefcase mr-2"></i> Contrato
                    </button>
                    <button onclick="EditorV2.switchTab('benefits')" class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="benefits">
                        <i class="fas fa-gift mr-2"></i> Benefícios
                    </button>
                    <button onclick="EditorV2.switchTab('dependents')" class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="dependents">
                        <i class="fas fa-users mr-2"></i> Dependentes
                    </button>
                </nav>
            </div>
        </div>

        <!-- Tab Content -->
        <div id="editor-content-area" class="bg-white rounded-lg shadow-sm p-6">
            <!-- Content will be loaded here -->
            <div class="text-center text-gray-500 py-12">
                <i class="fas fa-user-circle text-6xl mb-4"></i>
                <p class="text-lg">Selecione um colaborador para editar</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/pages/employees-pro-editor-new.js"></script>
    <script>
        // Inicializar quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', () => {
            EditorV2.initEditor();
        });
    </script>
</body>
</html>
